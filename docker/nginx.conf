server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Intentional: Directory listing enabled (vulnerability D1)
    autoindex on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Intentional: .git exposed (vulnerability D4)
    location /.git {
        autoindex on;
    }

    # Intentional: backup files exposed (vulnerability D3)
    location ~* \.(bak|sql|old|backup)$ {
        add_header Content-Type text/plain;
    }

    # Intentional: missing security headers
    # add_header X-Frame-Options DENY;
    # add_header X-Content-Type-Options nosniff;
    # add_header Content-Security-Policy "default-src 'self'";
}
