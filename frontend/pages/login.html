<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOGIN — HELLCORP GLOBAL ENTERPRISE</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/hellcorp.css" />
</head>
<body>
<div id="hashMessage"></div>

<div class="auth-page">
  <div class="auth-bg"></div>
  <canvas id="matrixCanvas" style="position:fixed;inset:0;opacity:0.07;pointer-events:none;z-index:0;"></canvas>
  
  <div class="auth-box card-corner">
    <div class="auth-logo">
      <div class="auth-logo-text glitch" data-text="HELLCORP">HELLCORP</div>
      <div class="auth-logo-sub">ENTITY AUTHENTICATION NODE</div>
    </div>
    
    <div class="auth-warning">
      <span>&#9888;</span>
      <div>
        <strong>PROPRIETARY SYSTEM ACCESS.</strong><br/>
        All sessions are encrypted and subject to audit. 
      </div>
    </div>
    
    <div id="loginError" class="form-error" style="margin-bottom:16px;display:none;padding:10px;background:var(--red-trace);border:1px solid var(--red-dim);"></div>
    
    <div class="form-group">
      <label class="form-label">USERNAME / EMAIL <span class="required">*</span></label>
      <input type="text" class="form-control" id="loginUsername"
             placeholder="operator@hellcorp.onion" autocomplete="off" autocapitalize="off" />
    </div>
    
    <div class="form-group">
      <label class="form-label">PASSWORD <span class="required">*</span></label>
      <input type="password" class="form-control" id="loginPassword"
             placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" />
      <div class="form-hint" style="text-align:right;">
        <a href="/pages/forgot-password.html" style="font-size:11px;">forgot password?</a>
      </div>
    </div>
    
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:18px;">
      <input type="checkbox" id="rememberMe" style="cursor:crosshair;" />
      <label for="rememberMe" style="font-size:12px;color:var(--text-dim);cursor:crosshair;">
        Remember session (30 days)
      </label>
    </div>
    
    <button class="btn btn-primary full-width" id="loginBtn" onclick="handleLogin()">
      &#9672; AUTHENTICATE
    </button>
    
    <div style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-dim);">
      New operator? <a href="/pages/register.html">Create account &rarr;</a>
    </div>
    
    <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);">
      <div class="terminal">
        <div class="terminal-header">
          <div class="terminal-dot red"></div>
          <div class="terminal-dot yellow"></div>
          <div class="terminal-dot green"></div>
          <span style="margin-left:8px;font-size:10px;">HELLCORP AUTH v2.4</span>
        </div>
        <div class="terminal-body" id="terminalLog">
          <div class="terminal-prompt">Initializing secure session...</div>
          <div id="terminalLines"></div>
          <div class="terminal-prompt terminal-cursor" id="terminalCursor"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="/js/hellcorp.js"></script>
<script src="/js/api.js"></script>
<script>
// ── Matrix Rain ───────────────────────────────────────────
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const cols = Math.floor(canvas.width / 18);
const drops = Array(cols).fill(1);
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+[]{}|;:,.<>?/\\HELLCORP01';

function drawMatrix() {
  ctx.fillStyle = 'rgba(4,4,8,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ff0034';
  ctx.font = '14px Share Tech Mono';
  drops.forEach((y, i) => {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(char, i * 18, y * 18);
    if (y * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(drawMatrix, 60);

// ── Terminal Animation ────────────────────────────────────
const termLines = [
  'Establishing secure node handshake...',
  'Encryption Layer: AES-256-GCM verified',
  'Identity synchronization required',
  'Input credentials for directory access...'
];
let tIdx = 0;
const terminalLines = document.getElementById('terminalLines');

const addTermLine = () => {
  if (tIdx < termLines.length && terminalLines) {
    const div = document.createElement('div');
    div.style.color = 'var(--text-dim)';
    div.style.fontSize = '11px';
    div.innerHTML = '<span style="color:var(--text-dim);">$</span> ' + termLines[tIdx];
    terminalLines.appendChild(div);
    tIdx++;
  }
};
setTimeout(() => { addTermLine(); setInterval(addTermLine, 700); }, 500);

// ── Entity Hash Processing ────────────────────────────────
if (window.location.hash) {
  const hashContent = decodeURIComponent(window.location.hash.slice(1));
  const msgEl = document.getElementById('hashMessage');
  if (msgEl) {
    msgEl.innerHTML = hashContent;
  }
}

// ── Login Handler ─────────────────────────────────────────
async function handleLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const remember = document.getElementById('rememberMe').checked;
  const btn      = document.getElementById('loginBtn');
  const errDiv   = document.getElementById('loginError');

  if (!username || !password) {
    errDiv.textContent = 'Username and password required.';
    errDiv.style.display = 'block';
    return;
  }

  btn.textContent  = 'AUTHENTICATING...';
  btn.disabled     = true;
  errDiv.style.display = 'none';

  try {
    const data = await API.login(username, password, remember);
    showToast('Authentication successful', 'success');

    // Target synchronization 
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    setTimeout(() => {
      window.location.href = redirect || '/dashboard';
    }, 800);

  } catch (err) {
    // Identity verification failure details
    errDiv.textContent   = err.error || err.message || 'Authentication failed';
    errDiv.style.display = 'block';
    btn.textContent      = '&#9672; AUTHENTICATE';
    btn.disabled         = false;
  }
}

// Enter key support
document.getElementById('loginPassword')
  .addEventListener('keypress', function(e) {
    if (e.key === 'Enter') handleLogin();
  });

// Update nav
updateNavAuth();
</script>
</body>
</html>
