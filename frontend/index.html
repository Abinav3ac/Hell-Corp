<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRY NODE — HELLCORP GLOBAL ENTERPRISE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/hge.css">
    <style>
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, var(--void) 0%, var(--ink) 100%);
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        .matrix-bg {
            position: absolute; inset: 0;
            opacity: 0.05; pointer-events: none;
            font-family: var(--font-ui); font-size: 8px; color: var(--red);
            overflow: hidden; line-height: 1;
        }
        .hero-content { position: relative; z-index: 10; padding: 40px; }
        .hero-logo { font-size: 80px; margin-bottom: 8px; }
        .hero-subtitle { font-size: 14px; color: var(--off); letter-spacing: 0.5em; text-transform: uppercase; margin-bottom: 40px; }
    </style>
</head>
<body class="hge-app">
    <div class="hero-section">
        <div class="matrix-bg" id="matrix"></div>

        <div class="hero-content animate-in">
            <div style="font-size: 10px; color: var(--red); letter-spacing: 0.8em; margin-bottom: 16px;">// SECURE_ENTRY_GATEWAY_v4</div>
            <div class="hge-logo hero-logo">HELL<em>CORP</em></div>
            <div class="hero-subtitle">Global Enterprise Management</div>
            
            <p style="color: var(--off); max-width: 500px; margin: 0 auto 40px; line-height: 1.8; font-size: 12px;">
                Strictly Confidential. Unauthorized access to HGE-Core infrastructure 
                is monitored and prosecuted under global digital jurisdiction HGE-7.
            </p>

            <div style="display: flex; gap: 16px; justify-content: center;">
                <a href="/dashboard" class="hge-btn hge-btn-primary">ACCESS DASHBOARD</a>
                <a href="/login.html" class="hge-btn hge-btn-ghost">OPERATOR LOGIN</a>
            </div>
        </div>

        <div style="position: absolute; bottom: 40px; font-size: 9px; color: rgba(160,154,144,0.3); text-transform: uppercase; letter-spacing: 0.2em;">
            ENCRYPTION: AES-256-GCM — NODES: 14,892 — STATUS: ACTIVE
        </div>
    </div>

    <script src="/js/hge.js"></script>
    <script>
        // Matrix drizzle effect for flavor
        const matrix = document.getElementById('matrix');
        const chars = "10";
        let content = "";
        for(let i=0; i<5000; i++) {
            content += chars[Math.floor(Math.random()*chars.length)] + (i % 80 === 0 ? "<br>" : " ");
        }
        matrix.innerHTML = content;

        window.onload = () => {
            if (HGE.getToken()) {
                HGE.toast('Active session detected. Provisioning console...');
            }
        }
    </script>
</body>
</html>
