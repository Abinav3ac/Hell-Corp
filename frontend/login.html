<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Hellcorp Global Enterprise</title>
    <link rel="stylesheet" href="/css/hellcorp.css">
    <script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, #0f172a 0%, #0a0c10 100%);
            position: relative;
            overflow: hidden;
        }
        .auth-wrapper::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background-image: radial-gradient(rgba(56, 139, 253, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotate(-15deg);
            z-index: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            z-index: 1;
            position: relative;
            animation: fadeInUp 0.6s ease forwards;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            width: 48px;
            height: 48px;
            background: var(--brand-primary);
            border-radius: var(--radius-md);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 0 20px var(--brand-glow);
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">H</div>
                <h1 style="font-size: 1.5rem; margin-bottom: 8px;">Access Corporate Portal</h1>
                <p style="color: var(--text-secondary); font-size: 0.875rem;">Enter your credentials to access HGE Management Console.</p>
            </div>

            <form class="card" id="loginForm" style="backdrop-filter: blur(10px); background: rgba(17, 20, 26, 0.8);">
                <div class="form-group">
                    <label class="form-label" for="usernameInput">Personnel ID / Username</label>
                    <div style="position: relative;">
                        <i class="fas fa-user-shield" style="position: absolute; left: 14px; top: 12px; color: var(--text-muted);"></i>
                        <input type="text" id="usernameInput" class="form-input" style="padding-left: 40px;" placeholder="e.g. j.doe" required autofocus>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label class="form-label" for="passwordInput">Secret Key</label>
                    <div style="position: relative;">
                        <i class="fas fa-lock" style="position: absolute; left: 14px; top: 12px; color: var(--text-muted);"></i>
                        <input type="password" id="passwordInput" class="form-input" style="padding-left: 40px;" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary full-width" style="height: 44px; font-size: 1rem;">
                    Sign In to Node
                </button>

                <div style="text-align: center; margin-top: 24px;">
                    <p style="font-size: 0.75rem; color: var(--text-muted);">
                        <i class="fas fa-info-circle"></i> Unauthorized access attempts are logged and reported to Security Operations Center (SOC).
                    </p>
                </div>
            </form>

            <div style="text-align: center; margin-top: 24px;">
                <a href="#" style="font-size: 0.75rem; color: var(--text-muted); text-decoration: underline;">Forgot access credentials?</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
