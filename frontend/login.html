<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH — HELLCORP GLOBAL ENTERPRISE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/hge.css">
    <style>
        .auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--void);
        }
        .auth-card {
            width: 400px;
            padding: 40px;
            background: var(--slab);
            border: 1px solid var(--edge);
            animation: animate-in 0.4s ease both;
        }
    </style>
</head>
<body class="hge-app">
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center; margin-bottom: 32px;">
                <div class="hge-logo" style="font-size: 32px; margin-bottom: 8px;">HELL<em>CORP</em></div>
                <div style="font-size: 8px; color: var(--red); letter-spacing: 0.3em; text-transform: uppercase;">Operator Authentication</div>
            </div>

            <form id="loginForm">
                <div style="margin-bottom: 20px;">
                    <label style="font-size: 8px; color: var(--off); letter-spacing: 0.1em; display: block; margin-bottom: 6px; text-transform: uppercase;">Operator ID</label>
                    <input type="text" id="usernameInput" class="hge-input" placeholder="e.g. ghostroot" required autofocus>
                </div>
                <div style="margin-bottom: 32px;">
                    <label style="font-size: 8px; color: var(--off); letter-spacing: 0.1em; display: block; margin-bottom: 6px; text-transform: uppercase;">Secret Key</label>
                    <input type="password" id="passwordInput" class="hge-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="hge-btn hge-btn-primary" style="width: 100%; justify-content: center;">ESTABLISH SESSION →</button>
            </form>

            <div style="margin-top: 32px; text-align: center;">
                <p style="font-size: 8px; color: rgba(160,154,144,0.4); line-height: 1.6; text-transform: uppercase; letter-spacing: 0.1em;">
                    Access to this node is strictly regulated. <br>
                    IP metadata is sharded and logged globally.
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/hge.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('usernameInput').value;
            const password = document.getElementById('passwordInput').value;

            try {
                const data = await HGE.api('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ username, password })
                });

                HGE.setToken(data.token);
                HGE.toast('Session Established. Syncing with Global Core...');
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } catch (err) {
                HGE.toast(err.message || 'Authentication Rejected', 'error');
            }
        });
    </script>
</body>
</html>
